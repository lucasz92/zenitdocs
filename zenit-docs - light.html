<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenit Docs - Light Mode</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --gh-blue: #0969da;
            --gh-bg: #ffffff;
            --gh-sidebar: #f6f8fa;
            --gh-border: #d0d7de;
            --gh-text: #1f2328;
            --gh-muted: #636c76;
        }

        body { 
            background-color: var(--gh-bg); 
            color: var(--gh-text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow: hidden; 
        }

        /* --- ESTILO DE ALERTA GITHUB (ONDA PRO) --- */
        .alert { 
            border-left-width: 4px; 
            padding: 1rem 1.25rem; 
            margin: 1.5rem 0; 
            border-radius: 6px; 
            font-size: 0.9rem;
            position: relative;
        }
        .alert strong { display: flex; items-center: center; gap: 8px; margin-bottom: 4px; font-size: 0.85rem; text-transform: capitalize; }
        
        .alert-note { background: #f0f7ff; border-color: #0969da; color: #0969da; }
        .alert-tip { background: #f0fff4; border-color: #1a7f37; color: #1a7f37; }
        .alert-warning { background: #fff8c5; border-color: #9a6700; color: #9a6700; }
        .alert-important { background: #fbefff; border-color: #8250df; color: #8250df; }

        /* --- MODO ZEN --- */
        .zen-mode #header-docs, .zen-mode #sidebar-vars, .zen-mode #preview-container { display: none !important; }
        .zen-mode #editor-container { position: fixed; inset: 0; width: 100vw; height: 100vh; background: #fff; padding: 10vh 20vw; }

        /* --- BOTONES --- */
        .btn-gh { 
            background: #f6f8fa; 
            border: 1px solid var(--gh-border); 
            color: var(--gh-text);
            padding: 5px 12px; 
            border-radius: 6px; 
            font-size: 12px; 
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.3, 0, 0.5, 1);
        }
        .btn-gh:hover { background: #f3f4f6; border-color: #8c959f; }
        .btn-primary { background: var(--gh-blue); color: white; border-color: rgba(27, 31, 36, 0.15); }
        .btn-primary:hover { background: #0860ca; }

        textarea { border: none; resize: none; font-family: 'Fira Code', monospace; }
        
        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #bbb; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header id="header-docs" class="h-14 border-b border-[#d0d7de] flex justify-between items-center bg-white px-5 shrink-0">
        <div class="flex items-center gap-3">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="#0969da" stroke="#0969da" stroke-width="2" stroke-linejoin="round"/>
            </svg>
            <h1 class="text-sm font-semibold tracking-tight">Zenit <span class="text-blue-600">Docs</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="save-indicator" class="text-[10px] font-mono text-gray-400">Listo</span>
            <button onclick="window.toggleZen()" class="btn-gh">Alt + Z Modo Zen</button>
            <button onclick="window.downloadMD()" class="btn-gh btn-primary">Exportar .md</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside id="sidebar-vars" class="w-64 border-r border-[#d0d7de] bg-[#f6f8fa] p-5 flex flex-col overflow-y-auto">
            <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Variables</h2>
            <div id="variables-list" class="space-y-3 flex-1"></div>
            <button onclick="window.addVariable()" class="mt-4 text-[10px] text-blue-600 font-semibold border border-blue-200 bg-blue-50 py-2 rounded hover:bg-blue-100 transition">+ Nueva Variable</button>
        </aside>

        <div id="editor-container" class="flex-1 flex flex-col bg-white">
            <textarea id="editor" class="flex-1 p-8 outline-none text-[13px] leading-relaxed text-gray-800" placeholder="Escribe tu documentación..."></textarea>
        </div>

        <div id="preview-container" class="flex-1 flex flex-col bg-white border-l border-[#d0d7de]">
            <div id="preview" class="flex-1 p-10 overflow-y-auto prose prose-sm prose-slate max-w-none"></div>
        </div>
    </main>

    <script>
        // Global Scope
        window.isZen = false;
        window.variables = JSON.parse(localStorage.getItem('zenit_vars_v5')) || {
            "proyecto": "Mi_Doc_Azul",
            "fecha": new Date().toLocaleDateString()
        };

        var editor = document.getElementById('editor');
        var preview = document.getElementById('preview');
        var saveStatus = document.getElementById('save-indicator');
        var timer;

        window.renderVariablesUI = function() {
            var list = document.getElementById('variables-list');
            list.innerHTML = '';
            for (var key in window.variables) {
                (function(k) {
                    var div = document.createElement('div');
                    div.className = "bg-white p-2 rounded border border-[#d0d7de] shadow-sm";
                    div.innerHTML = '<p class="text-[9px] text-blue-600 font-bold mb-1 uppercase tracking-tighter">{{' + k + '}}</p>' +
                                  '<input type="text" value="' + window.variables[k] + '" id="var-' + k + '" class="w-full text-xs text-gray-700 outline-none font-mono">';
                    list.appendChild(div);
                    document.getElementById('var-' + k).oninput = function() {
                        window.variables[k] = this.value;
                        localStorage.setItem('zenit_vars_v5', JSON.stringify(window.variables));
                        window.renderMarkdown();
                    };
                })(key);
            }
        };

        window.addVariable = function() {
            var name = prompt("Nombre de la variable:");
            if (name) {
                window.variables[name.replace(/\s+/g, '_')] = "valor";
                window.renderVariablesUI();
                window.renderMarkdown();
            }
        };

        window.toggleZen = function() {
            window.isZen = !window.isZen;
            document.body.classList.toggle('zen-mode', window.isZen);
        };

        window.downloadMD = function() {
            var blob = new Blob([editor.value], { type: 'text/markdown' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = (window.variables.proyecto || 'nota') + ".md";
            a.click();
        };

        window.renderMarkdown = function() {
            saveStatus.innerText = "Sincronizando...";
            clearTimeout(timer);
            timer = setTimeout(function() {
                var rawText = editor.value;

                // Reemplazo de variables
                for (var key in window.variables) {
                    var vRegex = new RegExp('{{' + key + '}}', 'g');
                    rawText = rawText.replace(vRegex, window.variables[key]);
                }

                var html = marked.parse(rawText);

                // Reemplazo de alertas con Iconos (SVG)
                var alerts = {
                    'NOTE': { class: 'alert-note', icon: 'ⓘ' },
                    'TIP': { class: 'alert-tip', icon: '💡' },
                    'WARNING': { class: 'alert-warning', icon: '⚠️' },
                    'IMPORTANT': { class: 'alert-important', icon: '💬' }
                };

                for (var tag in alerts) {
                    var aRegex = new RegExp('<blockquote>\\s*<p>\\[!' + tag + '\\]', 'g');
                    var replacement = '<div class="alert ' + alerts[tag].class + '">' +
                                      '<strong>' + alerts[tag].icon + ' ' + tag + '</strong><p>';
                    html = html.replace(aRegex, replacement);
                }
                html = html.replace(/<\/p>\s*<\/blockquote>/g, '</p></div>');

                preview.innerHTML = html;
                document.querySelectorAll('pre code').forEach(function(el) {
                    hljs.highlightElement(el);
                });

                localStorage.setItem('zenit_content_v5', editor.value);
                saveStatus.innerText = "Guardado local";
            }, 300);
        };

        // Eventos
        document.addEventListener('keydown', function(e) {
            if (e.altKey && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                window.toggleZen();
            }
            if (e.key === 'Escape' && window.isZen) window.toggleZen();
        });

        editor.oninput = window.renderMarkdown;

        window.onload = function() {
            var saved = localStorage.getItem('zenit_content_v5');
            editor.value = saved || "# Documentación {{proyecto}}\n\n> [!IMPORTANT]\n> Esta versión tiene el look oficial de GitHub Light.\n\n> [!TIP]\n> Usa las variables de la izquierda para automatizar tus notas.";
            window.renderVariablesUI();
            window.renderMarkdown();
        };
    </script>
</body>
</html>
